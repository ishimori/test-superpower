version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kintai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kintai}
      POSTGRES_DB: ${POSTGRES_DB:-kintai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kintai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kintai}
      POSTGRES_DB: ${POSTGRES_DB_TEST:-kintai_test}
    ports:
      - "5433:5432"

volumes:
  postgres_data:
